<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO -->
    <title>Gabrielle Chase Media — Award-Winning Art Direction & Content Production</title>
    <meta name="description" content="Gabrielle Chase Media Limited is a Nigerian award-winning Art Direction and Content Production studio. AMVCA10 Winner for Best Art Director. Credits include Netflix, HBO, Amazon Prime, and Showmax." />
    <meta name="keywords" content="Gabrielle Chase Media, Art Direction, Content Production, Set Design, Nollywood, Netflix, HBO, AMVCA, Abisola Omolade, Lagos Nigeria" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Gabrielle Chase Media — Award-Winning Art Direction & Content Production" />
    <meta property="og:description" content="Nigerian award-winning Art Direction and Content Production studio. AMVCA10 Winner. Netflix, HBO, Amazon Prime credits." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.gabriellechase.com" />
    
    <!-- Fonts (preconnect for performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/src/assets/GCM-logo_dark.png" />
    
    <!-- SPA for GitHub Pages -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
